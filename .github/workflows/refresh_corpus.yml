name: Weekly Corpus Refresh

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run corpus refresh (blog + arXiv)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 scripts/refresh_corpus.py

      - name: Run re-enrichment for any unenriched blog posts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 scripts/reenrich_blogs.py || true

      - name: Run eval to detect regressions
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 scripts/run_eval.py --synthesis

      - name: Commit updated snapshot and eval results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/wiki/schema/chromadb_snapshot.json
          git add -f data/wiki/schema/eval_results.json
          git diff --staged --quiet || git commit -m "chore(corpus): weekly refresh $(date -u +%Y-%m-%d)"
          git push
