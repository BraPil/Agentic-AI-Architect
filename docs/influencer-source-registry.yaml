version: 4
updated_on: 2026-04-18
purpose: >-
  Machine-ingestable registry of influencer profiles and influential post URLs
  relevant to the AI Architect knowledge surface.
ingestion_notes:
  - Many LinkedIn URLs are likely auth-blocked during anonymous collection.
  - Review state must distinguish between captured links and actually reviewed content.
  - Topic labels should remain conservative unless content is directly accessible.
  - YouTube transcript ingest requires yt-dlp or YouTube Data API; transcripts are the ingest target, not video files.
  - GitHub ingest targets README, repo description, release notes, and top-level code structure — not full codebase clone.
  - LinkedIn post ingest is auth-blocked by default; manual export or authenticated session required.

# Default ingestion targets applied to all persona sources unless overridden.
# The ingestion pipeline reads these at crawl time to scope collection per channel.
ingestion_defaults:
  youtube:
    enabled: true
    max_videos: 10
    strategy: most_recent
    ingest_transcripts: true
    ingest_descriptions: true
    ingest_titles: true
  linkedin:
    enabled: true
    max_posts: 10
    strategy: most_recent
    access_note: auth-blocked — requires exported content or authenticated session
  github:
    enabled: true
    max_repos: 3
    strategy: most_popular_by_stars
    ingest_readme: true
    ingest_releases: true
    ingest_top_level_structure: true

sources:
  - source_id: influencer_andrej_karpathy
    name: Andrej Karpathy
    entity_type: person
    tier: core
    priority_rank: 1
    monitor: true
    profile_url: https://www.linkedin.com/in/andrej-karpathy-9a650716/
    additional_channels:
      - type: youtube
        url: https://www.youtube.com/@AndrejKarpathy
        access: public
      - type: github
        url: https://github.com/karpathy
        access: public
    areas:
      - deep-learning
      - llms
      - neural-networks
      - education
      - research
      - vibe-coding
    ingestion_overrides:
      youtube:
        max_videos: 10
        strategy: most_recent
      github:
        max_repos: 5
        strategy: most_popular_by_stars
        # NOTE: user flagged "outresearch" and "llm wiki" as must-includes.
        # Best candidates: arxiv-sanity-preserver (Karpathy's arxiv discovery/filtering tool)
        # and llm.c (C-language GPT-2 implementation with extensive inline documentation).
        # Confirm these are the intended repos before pipeline build.
        pinned_repos:
          - repo: nanoGPT
            url: https://github.com/karpathy/nanoGPT
            foundational: false
            why: canonical GPT-2 reimplementation used as a teaching baseline across the field
          - repo: micrograd
            url: https://github.com/karpathy/micrograd
            foundational: false
            why: minimal autograd engine; foundational teaching tool for backprop
          - repo: makemore
            url: https://github.com/karpathy/makemore
            foundational: false
            why: character-level language model series companion to the nn-zero-to-hero YouTube course
          - repo: autoresearch
            url: https://github.com/karpathy/autoresearch
            foundational: true
            why: >-
              user-confirmed must-include; potentially foundational — Karpathy's
              autonomous research tooling; evaluate for direct adoption or influence
              on AAA's research pipeline design
        pinned_gists:
          - gist: LLM Wiki
            url: https://gist.github.com/karpathy/442a6bf555914893e9891c11519de94f
            seed_file: data/seeds/karpathy_llm_wiki.md
            foundational: true
            why: >-
              user-confirmed must-include; specifies the three-layer knowledge
              architecture (raw sources / wiki / schema) and Ingest-Query-Lint
              operations that directly inform AAA's knowledge layer design (P2.4,
              P6.4); treat as a primary architectural specification, not just a
              source. NOTE: WebFetch processing returned a prompt-injected
              response on this URL — raw content fetched via curl and verified
              clean; see seed file header for details.
    posts: []

