        strategy: pinned
        pinned_repos:
          - repo: dark-factory-experiment
            url: https://github.com/coleam00/dark-factory-experiment
            foundational: true
            why: >-
              autonomous software factory pattern — Archon + Claude Code + LLM;
              GitHub as state machine; issue/PR lifecycle with label-based
              orchestration; budget caps and validation independence; directly
              relevant to AAA Phase 4 (orchestration) and Phase 6
              (self-improvement loop)
          - repo: Archon
            url: https://github.com/coleam00/Archon
            foundational: true
            why: >-
              open-source YAML-defined workflow engine for AI coding agents;
              makes AI coding deterministic and repeatable; strong candidate for
              AAA's Phase 4 orchestration strategy — evaluate against LangGraph
              and custom BaseAgent approach before P4.1 decision
          - repo: adversarial-dev
            url: https://github.com/coleam00/adversarial-dev
            foundational: true
            why: >-
              GAN-inspired Planner/Generator/Evaluator harness; evaluator
              actively tries to break what the generator builds; sprint contracts
              negotiated before coding; directly relevant to AAA Phase 3
              evaluation framework (P3.3) and Phase 6 self-improvement; based on
              Anthropic harness design article
          - repo: second-brain-starter
            url: https://github.com/coleam00/second-brain-starter
            foundational: true
            why: >-
              Claude Code skill for generating personalized Second Brain PRD;
              SOUL.md/USER.md/MEMORY.md persistence pattern; proactive
              monitoring; relevant to Phase 6 knowledge refinement and
              potentially to persona analog memory architecture
          - repo: claude-memory-compiler
            url: https://github.com/coleam00/claude-memory-compiler
            foundational: false
            why: >-
              transforms Claude conversations into searchable KB using session-end
              hooks; structured index.md beats vector RAG at personal scale
              (50-500 articles); relevant to Phase 6 knowledge distillation (P6.4)
    posts: []

