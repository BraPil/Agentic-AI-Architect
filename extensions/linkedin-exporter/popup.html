<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AAA LinkedIn Exporter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 320px;
      background: #0a0a0a;
      color: #e5e5e5;
      padding: 16px;
    }

    h1 {
      font-size: 13px;
      font-weight: 600;
      color: #0077b5;
      margin-bottom: 4px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .subtitle {
      font-size: 11px;
      color: #888;
      margin-bottom: 14px;
    }

    .section-label {
      font-size: 10px;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin: 12px 0 6px;
    }

    .page-url {
      font-size: 11px;
      color: #aaa;
      word-break: break-all;
      margin-bottom: 12px;
      padding: 6px 8px;
      background: #141414;
      border-radius: 4px;
      border: 1px solid #222;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 9px 12px;
      border: none;
      border-radius: 5px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 7px;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary   { background: #0077b5; color: #fff; }
    .btn-secondary { background: #1a1a1a; color: #ccc; border: 1px solid #333; }
    .btn-success   { background: #166534; color: #86efac; }
    .btn-scroll    { background: #1c1c2e; color: #a5b4fc; border: 1px solid #3730a3; }

    .status {
      font-size: 11px;
      color: #888;
      margin-top: 10px;
      min-height: 18px;
      line-height: 1.4;
    }
    .status.ok   { color: #4ade80; }
    .status.err  { color: #f87171; }
    .status.info { color: #60a5fa; }

    .count-badge {
      display: inline-block;
      background: #0077b5;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 10px;
      margin-left: 6px;
    }

    .options {
      margin: 6px 0;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .option-row {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      color: #aaa;
    }

    label { cursor: pointer; }

    input[type="number"] {
      width: 50px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 3px;
      color: #e5e5e5;
      font-size: 11px;
      padding: 2px 5px;
    }

    .divider { border: none; border-top: 1px solid #1e1e1e; margin: 10px 0; }

    .warning {
      font-size: 10px;
      color: #f59e0b;
      background: #1c1500;
      border: 1px solid #3b2500;
      border-radius: 4px;
      padding: 5px 7px;
      margin-bottom: 8px;
      display: none;
    }
  </style>
</head>
<body>
  <h1>AAA LinkedIn Exporter</h1>
  <p class="subtitle">Export posts for AAA knowledge ingest</p>

  <div class="page-url" id="pageUrl">Loading…</div>

  <div class="warning" id="notLinkedIn">
    Navigate to a LinkedIn page first (e.g. your reactions page).
  </div>

  <div class="section-label">Options</div>
  <div class="options">
    <div class="option-row">
      <input type="checkbox" id="expandReadMore" checked />
      <label for="expandReadMore">Expand "Read more" on all posts</label>
    </div>
    <div class="option-row">
      <label for="scrollCount">Auto-scroll loads:</label>
      <input type="number" id="scrollCount" value="15" min="1" max="50" />
    </div>
  </div>

  <hr class="divider" />

  <button class="btn btn-scroll" id="btnScroll">↓ Scroll to load more posts</button>
  <button class="btn btn-primary" id="btnScrape">Scrape visible posts</button>
  <button class="btn btn-primary" id="btnScrollScrape">↓ Scroll + Scrape all</button>

  <hr class="divider" />

  <button class="btn btn-success" id="btnDownload" disabled>
    ⬇ Download JSON <span class="count-badge" id="countBadge">0</span>
  </button>
  <button class="btn btn-secondary" id="btnCopy" disabled>Copy JSON to clipboard</button>

  <div class="status" id="status">Ready.</div>

  <script src="popup.js"></script>
</body>
</html>
